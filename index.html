<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyberpunk ADV</title>

<style>
body{
margin:0;
background:black;
color:#00ffcc;
font-family:monospace;
overflow:hidden;
}

#ui{
display:flex;
flex-direction:column;
height:100vh;
}

#status{
padding:5px 10px;
border-bottom:1px solid #00ffcc;
font-size:12px;
}

#log{
flex:1;
overflow-y:auto;
padding:10px;
}

#command{
border-top:1px solid #00ffcc;
padding:10px;
}

.cmd{
display:block;
margin-top:5px;
color:#00ffcc;
background:none;
border:none;
text-align:left;
font-size:14px;
}

.glitch{
animation: glitch 0.15s infinite;
}

@keyframes glitch{
0%{transform:translate(0)}
20%{transform:translate(-2px,2px)}
40%{transform:translate(2px,-2px)}
60%{transform:translate(-1px,1px)}
100%{transform:translate(0)}
}
</style>
</head>

<body>

<div id="ui">
  <div id="status">[ --:--:-- ] CONNECTING...</div>
  <div id="log"></div>
  <div id="command"></div>
</div>

<!-- 順番が重要 -->
<script src="log01.js"></script>
<script src="system.js"></script>
<script src="engine.js"></script>

</body>
</html>
