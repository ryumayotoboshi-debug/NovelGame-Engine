<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Novel Engine</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
overflow:hidden;
}

#game{
position:relative;
width:100vw;
height:100vh;
}

#bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

#textBox{
position:absolute;
bottom:0;
width:100%;
height:30%;
background:rgba(0,0,0,0.6);
padding:20px;
box-sizing:border-box;
}

#text{
font-size:18px;
line-height:1.6;
}

#choices{
margin-top:10px;
}

.choice{
display:block;
margin-top:5px;
padding:8px;
background:#222;
border:none;
color:white;
width:100%;
text-align:left;
}

#next{
position:absolute;
right:20px;
bottom:20px;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<div id="game">

<img id="bg" src="">

<div id="textBox">

<div id="text"></div>

<div id="choices"></div>

<div id="next">▶ tap</div>

</div>
</div>

<script src="scenario.js"></script>
<script src="engine.js"></script>

</body>
</html>
